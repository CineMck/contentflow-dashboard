            {/* Bulk action bar */}
            {selectedPosts.size > 0 && (
              <div className="bulk-bar">
                <span className="bulk-count">{selectedPosts.size} selected</span>
                <button className="btn btn-success btn-sm" onClick={() => handleBulkAction('approve')}>{Icons.thumbUp} Approve All</button>
                <button className="btn btn-danger btn-sm" onClick={() => handleBulkAction('reject')}>{Icons.thumbDown} Reject All</button>
                <button className="btn btn-ghost btn-sm" onClick={() => handleBulkAction('needs_revision')}>Request Revision</button>
                <button className="btn btn-danger btn-sm" onClick={handleBulkDelete} style={{ marginLeft: 8 }}>{Icons.trash} Delete</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setSelectedPosts(new Set())}>{Icons.close} Clear</button>
              </div>
            )}
          </main>

          {/* Modals */}
          {detailPost && (
            <PostDetailModal
              post={detailPost}
              onClose={() => setDetailPost(null)}
              onUpdate={() => { loadPosts(); openDetail(detailPost); }}
              user={user}
            />
          )}

          {showCreate && (
            <CreatePostModal
              onClose={() => setShowCreate(false)}
              onCreate={loadPosts}
              tags={tags}
            />
          )}
        </div>
      );
    }

    // ========== Users Panel ==========
    function UsersPanel({ user: currentUser }) {
      const [users, setUsers] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [editingUser, setEditingUser] = useState(null);
      const [form, setForm] = useState({ email: "", password: "", name: "", role: "client" });
      const [editForm, setEditForm] = useState({ name: "", email: "", role: "" });

      useEffect(function() { loadUsers(); }, []);

      async function loadUsers() {
        try {
          var res = await fetch("/api/auth/users", { headers: authHeaders() });
          var data = await res.json();
          setUsers(data);
        } catch(err) { console.error(err); }
      }

      async function handleAddUser(e) {
        e.preventDefault();
        try {
          await fetch("/api/auth/users", {
            method: "POST",
            headers: Object.assign({}, authHeaders(), { "Content-Type": "application/json" }),
            body: JSON.stringify(form)
          });
          setForm({ email: "", password: "", name: "", role: "client" });
          setShowAdd(false);
          loadUsers();
        } catch(err) { console.error(err); }
      }

      async function handleEditUser(e) {
        e.preventDefault();
        try {
          await fetch("/api/auth/users/" + editingUser.id, {
            method: "PUT",
            headers: Object.assign({}, authHeaders(), { "Content-Type": "application/json" }),
            body: JSON.stringify(editForm)
          });
          setEditingUser(null);
          loadUsers();
        } catch(err) { console.error(err); }
      }

      async function handleDeleteUser(uid) {
        if (!confirm("Delete this user? This cannot be undone.")) return;
        try {
          await fetch("/api/auth/users/" + uid, { method: "DELETE", headers: authHeaders() });
          loadUsers();
        } catch(err) { console.error(err); }
      }

      function startEdit(u) {
        setEditingUser(u);
        setEditForm({ name: u.name, email: u.email, role: u.role });
      }

      return React.createElement("div", { className: "users-panel" },
        editingUser && React.createElement("div", { className: "modal-overlay", onClick: function() { setEditingUser(null); } },
          React.createElement("div", { className: "detail-modal", onClick: function(e) { e.stopPropagation(); }, style: { maxWidth: "480px" } },
            React.createElement("div", { className: "detail-header" },
              React.createElement("h2", null, "Edit User"),
              React.createElement("button", { className: "btn-close", onClick: function() { setEditingUser(null); } }, "\u00D7")
            ),
            React.createElement("form", { onSubmit: handleEditUser, style: { padding: "24px", display: "flex", flexDirection: "column", gap: "16px" } },
              React.createElement("div", null,
                React.createElement("label", { style: { display: "block", marginBottom: "6px", fontSize: "13px", color: "var(--text-secondary)" } }, "Name"),
                React.createElement("input", { type: "text", value: editForm.name, onChange: function(e) { setEditForm(Object.assign({}, editForm, { name: e.target.value })); }, style: { width: "100%", padding: "10px 12px", borderRadius: "8px", border: "1px solid var(--border)", background: "var(--bg-secondary)", color: "var(--text-primary)", fontSize: "14px" } })
              ),
              React.createElement("div", null,
                React.createElement("label", { style: { display: "block", marginBottom: "6px", fontSize: "13px", color: "var(--text-secondary)" } }, "Email"),
                React.createElement("input", { type: "email", value: editForm.email, onChange: function(e) { setEditForm(Object.assign({}, editForm, { email: e.target.value })); }, style: { width: "100%", padding: "10px 12px", borderRadius: "8px", border: "1px solid var(--border)", background: "var(--bg-secondary)", color: "var(--text-primary)", fontSize: "14px" } })
              ),
              React.createElement("div", null,
                React.createElement("label", { style: { display: "block", marginBottom: "6px", fontSize: "13px", color: "var(--text-secondary)" } }, "Role"),
                React.createElement("select", { value: editForm.role, onChange: function(e) { setEditForm(Object.assign({}, editForm, { role: e.target.value })); }, style: { width: "100%", padding: "10px 12px", borderRadius: "8px", border: "1px solid var(--border)", background: "var(--bg-secondary)", color: "var(--text-primary)", fontSize: "14px" } },
                  React.createElement("option", { value: "client" }, "Client"),
                  React.createElement("option", { value: "admin" }, "Admin"),
                  React.createElement("option", { value: "super_admin" }, "Super Admin")
                )
              ),
              React.createElement("div", { style: { display: "flex", gap: "12px", justifyContent: "flex-end" } },
                React.createElement("button", { type: "button", onClick: function() { setEditingUser(null); }, className: "btn-secondary" }, "Cancel"),
                React.createElement("button", { type: "submit", className: "btn-primary" }, "Save Changes")
              )
            )
          )
        ),
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "24px" } },
          React.createElement("h2", { style: { fontSize: "20px", fontWeight: "600" } }, "Users"),
          currentUser.role === "super_admin" && React.createElement("button", { className: "btn-primary", onClick: function() { setShowAdd(!showAdd); } }, showAdd ? "Cancel" : "+ Add User")
        ),
        showAdd && React.createElement("form", { onSubmit: handleAddUser, className: "add-user-form", style: { marginBottom: "24px", padding: "20px", background: "var(--bg-secondary)", borderRadius: "12px", display: "flex", flexDirection: "column", gap: "12px" } },
          React.createElement("input", { type: "text", placeholder: "Name", value: form.name, onChange: function(e) { setForm(Object.assign({}, form, { name: e.target.value })); }, style: { padding: "10px 12px", borderRadius: "8px", border: "1px solid var(--border)", background: "var(--bg-primary)", color: "var(--text-primary)", fontSize: "14px" } }),
          React.createElement("input", { type: "email", placeholder: "Email", value: form.email, onChange: function(e) { setForm(Object.assign({}, form, { email: e.target.value })); }, required: true, style: { padding: "10px 12px", borderRadius: "8px", border: "1px solid var(--border)", background: "var(--bg-primary)", color: "var(--text-primary)", fontSize: "14px" } }),
          React.createElement("input", { type: "password", placeholder: "Password", value: form.password, onChange: function(e) { setForm(Object.assign({}, form, { password: e.target.value })); }, required: true, style: { padding: "10px 12px", borderRadius: "8px", border: "1px solid var(--border)", background: "var(--bg-primary)", color: "var(--text-primary)", fontSize: "14px" } }),
          React.createElement("select", { value: form.role, onChange: function(e) { setForm(Object.assign({}, form, { role: e.target.value })); }, style: { padding: "10px 12px", borderRadius: "8px", border: "1px solid var(--border)", background: "var(--bg-primary)", color: "var(--text-primary)", fontSize: "14px" } },
            React.createElement("option", { value: "client" }, "Client"),
            React.createElement("option", { value: "admin" }, "Admin"),
            React.createElement("option", { value: "super_admin" }, "Super Admin")
          ),
          React.createElement("button", { type: "submit", className: "btn-primary", style: { alignSelf: "flex-start" } }, "Create User")
        ),
        React.createElement("div", { className: "user-list", style: { display: "flex", flexDirection: "column", gap: "8px" } },
          users.map(function(u) {
            return React.createElement("div", { key: u.id, style: { display: "flex", alignItems: "center", padding: "14px 16px", background: "var(--bg-secondary)", borderRadius: "10px", gap: "14px" } },
              React.createElement("div", { style: { width: "40px", height: "40px", borderRadius: "50%", background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: "600", fontSize: "16px", flexShrink: 0 } }, (u.name || u.email || "?").charAt(0).toUpperCase()),
              React.createElement("div", { style: { flex: 1, minWidth: 0 } },
                React.createElement("div", { style: { fontWeight: "500", fontSize: "14px", color: "var(--text-primary)" } }, u.name || "No name"),
                React.createElement("div", { style: { fontSize: "13px", color: "var(--text-secondary)", marginTop: "2px" } }, u.email)
              ),
              React.createElement("span", { className: "badge badge-" + (u.role === "super_admin" ? "approved" : u.role === "admin" ? "pending" : "default"), style: { fontSize: "12px", flexShrink: 0 } }, u.role === "super_admin" ? "Super Admin" : u.role === "admin" ? "Admin" : "Client"),
              currentUser.role === "super_admin" && u.id !== currentUser.id && React.createElement("div", { style: { display: "flex", gap: "8px", flexShrink: 0 } },
                React.createElement("button", { onClick: function() { startEdit(u); }, style: { padding: "6px 14px", borderRadius: "6px", border: "1px solid var(--border)", background: "var(--bg-primary)", color: "var(--text-primary)", cursor: "pointer", fontSize: "13px" } }, "Edit"),
                React.createElement("button", { onClick: function() { handleDeleteUser(u.id); }, style: { padding: "6px 14px", borderRadius: "6px", border: "1px solid #ef4444", background: "transparent", color: "#ef4444", cursor: "pointer", fontSize: "13px" } }, "Delete")
              )
            );
          })
        )
      );
    }

    // ========== App Root ==========
    function App() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        const token = localStorage.getItem('token');
        if (token) {
          api('/auth/me').then(setUser).catch(() => localStorage.removeItem('token')).finally(() => setChecking(false));
        } else {
          setChecking(false);
        }
      }, []);

      function handleLogout() {
        localStorage.removeItem('token');
        setUser(null);
      }

      if (checking) return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: 'var(--text-muted)' }}><div style={{ animation: 'pulse 1.5s infinite', fontSize: 16 }}>Loading...</div></div>;
      if (!user) return <LoginPage onLogin={setUser} />;
      return <Dashboard user={user} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
